# =========================================================================
#  生成 GitHub 贡献蛇动画（snake animation）
#  生成后会推送到当前仓库的 output 分支，README 里通过 raw.githubusercontent.com 引用
#
#  运行时机：
#    1. 每 24 小时自动跑一次（保持贡献格最新）
#    2. 手动点 "Run workflow" 立即触发
#    3. 推送到 main 分支时触发（比如你修改 README 提交后会重新生成）
# =========================================================================

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. 读取你的贡献数据并生成 SVG / GIF
      - name: Generate github-contribution-grid-snake files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#A78BFA&color_dots=#1a1b27,#3b2f60,#6246a3,#8b6ddb,#c7b5ff

      # 2. 把生成的文件推送到 output 分支
      - name: Push SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
